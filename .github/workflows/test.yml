name: Test and Demo

on:
  push:
    branches: [ main, enhance-patterns-and-testing ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'  # Daily run at midnight

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
    
    - name: Run tests with coverage
      run: |
        pytest test_patterns.py -v --cov=pattern_detector --cov=enhanced_patterns --cov-report=xml --cov-report=term
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  demo:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run pattern detection demo
      run: |
        python demo.py --symbol BTCUSDT --interval 1h --no-plot
        python demo.py --symbol ETHUSDT --interval 4h --no-plot
    
    - name: Generate pattern report
      run: |
        python generate_report.py
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: pattern-reports
        path: |
          *.csv
          *.json
          report.md